<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURELIEN E-commerce Catalog</title>
</head>
<body>
    <header>
        <h1>Welcome to AURELIEN</h1>
        <nav>
            <ul>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="products">
            <h2>Our Products</h2>
            <div class="product">
                <h3>Product Name</h3>
                <p>Description of the product. Pricing and other details.</p>
                <button>Add to Cart</button>
            </div>
            <!-- More products can be added here -->
        </section>
        <section id="about">
            <h2>About Us</h2>
            <p>Information about the AURELIEN brand and its mission.</p>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <p>Contact details and form for inquiries.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 AURELIEN. All rights reserved.</p>
    </footer>
</body>
</html>
