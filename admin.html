<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Admin Panel</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>Admin Panel</h1>\n    </header>\n    <main>\n        <section id="product-management">\n            <h2>Product Management</h2>\n            <form id="product-form">\n                <label for="product-name">Product Name:</label>\n                <input type="text" id="product-name" name="product-name" required>\n                <label for="product-image">Upload Image:</label>\n                <input type="file" id="product-image" name="product-image" accept="image/*" required>\n                <button type="submit">Add Product</button>\n            </form>\n        </section>\n        <section id="brand-management">\n            <h2>Brand Management</h2>\n            <form id="brand-form">\n                <label for="brand-name">Brand Name:</label>\n                <input type="text" id="brand-name" name="brand-name" required>\n                <button type="submit">Add Brand</button>\n            </form>\n        </section>\n        <section id="category-management">\n            <h2>Category Management</h2>\n            <form id="category-form">\n                <label for="category-name">Category Name:</label>\n                <input type="text" id="category-name" name="category-name" required>\n                <button type="submit">Add Category</button>\n            </form>\n        </section>\n        <section id="data-export">\n            <h2>Data Export for Shopify</h2>\n            <button id="export-button">Export Data</button>\n        </section>\n    </main>\n    <footer>\n        <p>&copy; 2026 byronrsa-glitch</p>\n    </footer>\n</body>\n</html>
